<!DOCTYPE html>
<html>
<head>
  <title>EcoTrack AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🌍 EcoTrack AI</h1>

  <p>Enter your daily lifestyle details:</p>

  <input id="car" placeholder="Car km per day">
  <input id="electricity" placeholder="Electricity units per month">
  <input id="flights" placeholder="Flights per month">
  <input id="food" placeholder="Food type (veg/non-veg)">

  <button onclick="calculate()">Calculate Carbon Footprint</button>

  <h2>Result:</h2>
  <p id="output"></p>

</body>

<script src="app.js"></script>
</html>
